<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEON DROP Support</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090a16;
      --panel: #15162b;
      --text: #f3f5ff;
      --muted: #b7bdd6;
      --cyan: #34f1de;
      --border: #30334d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.65;
    }
    main {
      width: min(720px, calc(100% - 36px));
      margin: 0 auto;
      padding: 56px 0;
    }
    h1 { margin: 0 0 14px; font-size: 2.2rem; line-height: 1.12; }
    p { margin: 0 0 18px; color: var(--muted); font-size: 1.04rem; }
    .panel {
      margin-top: 26px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
    }
    a { color: var(--cyan); }
  </style>
</head>
<body>
  <main>
    <h1>NEON DROP Support</h1>
    <p>NEON DROP is a free, offline color-sort puzzle game. No account is required and all progress is stored locally on your device.</p>
    <div class="panel">
      <p>For support questions, bug reports, or App Review inquiries, contact:</p>
      <p><a href="mailto:bjlisa.a@gmail.com">bjlisa.a@gmail.com</a></p>
    </div>
    <p><a href="../">Back to NEON DROP</a></p>
  </main>
</body>
</html>
